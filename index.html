<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TATIC SIMULATOR V3 - BLUE BOX MODE</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Menu e Metar */
        .header-section { flex-shrink: 0; margin-bottom: 10px; }
        .menu { background: #1a1a1a; padding: 10px; border-radius: 6px; display: flex; flex-wrap: wrap; gap: 10px; border: 1px solid #333; align-items: flex-end; margin-bottom: 10px; }
        .inp-group { display: flex; flex-direction: column; gap: 3px; }
        .inp-group label { font-size: 10px; color: #aaa; font-weight: bold; }
        input { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 6px; text-transform: uppercase; border-radius: 4px; font-size: 12px; }
        button { background: #008148; color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        .metar-bar { background: #000; border: 1px solid #333; padding: 8px; border-radius: 4px; color: #00cfc1; font-family: monospace; font-size: 13px; cursor: pointer; }
        #metar-edit-input { display: none; width: 100%; background: #111; border: 1px solid #00cfc1; color: #00cfc1; padding: 4px; font-family: monospace; }

        /* Container das Posições */
        .main-container { display: flex; gap: 10px; flex: 1; overflow: hidden; padding-bottom: 10px; }
        .column { display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .col-side { width: 340px; flex: none; }

        .box-area { 
            flex: 1; border: 2px solid #333; background: #111; border-radius: 6px; 
            position: relative; overflow-y: auto; padding: 25px 8px 8px 8px;
            display: flex; flex-direction: column; gap: 8px; min-height: 100px;
        }
        .box-area::before { content: attr(data-label); position: absolute; top: 4px; right: 8px; color: #555; font-size: 10px; font-weight: bold; }
        
        #POS1 { border-color: #0056b3; }
        #POS5 { border-color: #444; width: 280px; flex: none; }

        /* --- A STRIP --- */
        .strip { 
            background: #adb5bd; color: #000; flex-shrink: 0; border-left: 10px solid #444; 
            cursor: pointer; border-radius: 4px; border: 1px solid #666; width: 100%;
            display: block; font-weight: bold; padding: 0; overflow: hidden; transition: 0.1s;
        }

        .s-row { display: flex; width: 100%; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
        .s-cell { padding: 4px 6px; font-family: monospace; border-right: 0.5px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; height: 28px; }
        
        .c-cs-box { width: 115px; flex-direction: column; align-items: flex-start; justify-content: center; height: 56px; border-right: 2px solid #555; }
        .c-cs { font-size: 18px; font-weight: 900; line-height: 1; }
        .c-ad { font-size: 10px; color: #333; margin-top: 4px; }
        
        .c-data { width: 65px; font-size: 13px; }
        .c-top { background: rgba(255,255,255,0.15); }
        
        /* TAGS - AJUSTE DO BOX AZUL GRANDE */
        .c-tags { flex: 1; justify-content: flex-end; border-right: none; padding-right: 10px; }
        .tag-box-large { color: #0056b3; font-size: 20px; font-weight: 900; margin-right: 8px; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        .tag-p4 { background: #fd7e14; color: #fff; padding: 2px 8px; font-size: 12px; border-radius: 3px; border: 1px solid #c45a00; }
        
        .s-rmk-row { font-size: 10px; font-style: italic; background: rgba(255,255,255,0.3); padding: 3px 8px; border-top: 0.5px solid #888; }
        
        /* Estados */
        .selected { outline: 4px solid #007bff !important; background: #fff !important; transform: scale(1.01); z-index: 5; }
        .ready { border: 4px solid #00ff00 !important; }
        .ssr-emergency { background: #ff0000 !important; color: #fff !important; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.6; } }

        /* Modal */
        #modalEdit { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 20px; border-radius: 8px; border: 2px solid #008148; width: 420px; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="menu">
            <div class="inp-group"><label>CS</label><input type="text" id="in-cs" placeholder="TAM3321" style="width:85px"></div>
            <div class="inp-group"><label>EOBT</label><input type="text" id="in-eobt" value="1430" style="width:50px"></div>
            <div class="inp-group"><label>DEP</label><input type="text" id="in-dep" value="SBSJ" style="width:55px"></div>
            <div class="inp-group"><label>DEST</label><input type="text" id="in-dest" value="SBMT" style="width:55px"></div>
            <div class="inp-group"><label>BOX</label><input type="text" id="in-gt" value="A01" style="width:45px"></div>
            <div class="inp-group"><label>TIPO</label><input type="text" id="in-ty" value="C172" style="width:55px"></div>
            <div class="inp-group"><label>NÍVEL</label><input type="text" id="in-lv" value="A045" style="width:55px"></div>
            <div class="inp-group"><label>SSR</label><input type="text" id="in-ss" value="2000" style="width:50px"></div>
            <div class="inp-group"><label>OBS</label><input type="text" id="in-rk" value="SID" style="width:120px"></div>
            <button onclick="criarFicha()">INSERIR</button>
        </div>

        <div class="metar-bar" onclick="editMetar()">
            <span id="metar-display">SBSJ 281400Z 12010KT 9999 FEW030 25/15 Q1012</span>
            <input type="text" id="metar-edit-input" onblur="saveMetar(this.value)" onkeydown="if(event.key==='Enter') this.blur()">
        </div>
    </div>

    <div class="main-container">
        <div class="column col-side">
            <div class="box-area" id="POS3" data-label="POSIÇÃO 3 (CLD/DLV)"></div>
            <div class="box-area" id="POS1" data-label="POSIÇÃO 1 (INBOX)"></div>
        </div>
        
        <div class="column">
            <div class="box-area" id="POS4" data-label="POSIÇÃO 4 (TAXI/DEP)"></div>
            <div class="box-area" id="POS2" data-label="POSIÇÃO 2 (PRE-DEP)"></div>
        </div>

        <div class="box-area" id="POS5" data-label="POSIÇÃO 5 (OFF)"></div>
    </div>

    <div id="modalEdit">
        <div class="modal-content">
            <h3 style="margin-top:0">EDITAR PLANO</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="ed-cs" placeholder="CS">
                <input type="text" id="ed-eobt" placeholder="EOBT">
                <input type="text" id="ed-ty" placeholder="TIPO">
                <input type="text" id="ed-ss" placeholder="SSR">
                <input type="text" id="ed-lv" placeholder="NIVEL">
                <input type="text" id="ed-rk" placeholder="REMARKS">
                <input type="text" id="ed-gt" placeholder="BOX">
            </div>
            <div style="text-align:right">
                <button onclick="fecharModal()" style="background:#444">CANCELAR</button>
                <button onclick="salvarEdicao()">SALVAR</button>
            </div>
        </div>
    </div>

    <script>
        var ativa = null;
        var p4_etapas = ["wPush", "cPush", "Push", "wTaxi", "cTaxi", "Taxi"];

        function editMetar() {
            const d = document.getElementById('metar-display'), i = document.getElementById('metar-edit-input');
            i.value = d.innerText; d.style.display = 'none'; i.style.display = 'block'; i.focus();
        }
        function saveMetar(v) {
            const d = document.getElementById('metar-display'), i = document.getElementById('metar-edit-input');
            if(v) d.innerText = v.toUpperCase();
            d.style.display = 'block'; i.style.display = 'none';
        }

        function criarFicha() {
            const dados = {
                cs: document.getElementById('in-cs').value.toUpperCase(),
                eobt: document.getElementById('in-eobt').value,
                dep: document.getElementById('in-dep').value.toUpperCase(),
                dest: document.getElementById('in-dest').value.toUpperCase(),
                gate: document.getElementById('in-gt').value.toUpperCase(),
                ty: document.getElementById('in-ty').value.toUpperCase(),
                lv: document.getElementById('in-lv').value.toUpperCase(),
                ss: document.getElementById('in-ss').value,
                rk: document.getElementById('in-rk').value.toUpperCase()
            };
            if(!dados.cs) return;
            const d = document.createElement('div');
            d.className = 'strip';
            Object.assign(d.dataset, dados);
            d.dataset.loc = "1"; d.dataset.p4i = "-1";
            renderizarStrip(d);
            d.onclick = (e) => { e.stopPropagation(); if(ativa) ativa.classList.remove('selected'); ativa=d; d.classList.add('selected'); };
            document.getElementById('POS1').appendChild(d);
            document.getElementById('in-cs').value = ""; document.getElementById('in-cs').focus();
        }

        function renderizarStrip(d) {
            const ssr = d.dataset.ss;
            let emClass = "", ssrTxt = ssr;
            if(["7500","7600","7700"].includes(ssr)){ emClass="ssr-emergency"; ssrTxt += " !!"; }

            d.innerHTML = `
                <div style="display:flex">
                    <div class="c-cs-box s-cell">
                        <span class="c-cs">${d.dataset.cs}</span>
                        <span class="c-ad">${d.dataset.dep} > ${d.dataset.dest}</span>
                    </div>
                    <div style="flex:1">
                        <div class="s-row">
                            <div class="s-cell c-data c-top">${d.dataset.eobt}</div>
                            <div class="s-cell c-data c-top">${d.dataset.lv}</div>
                            <div class="s-cell c-tags st-p4"></div>
                        </div>
                        <div class="s-row">
                            <div class="s-cell c-data">${d.dataset.ty}</div>
                            <div class="s-cell c-data">${ssrTxt}</div>
                            <div class="s-cell c-tags"></div>
                        </div>
                    </div>
                </div>
                <div class="s-rmk-row ${emClass}">RMK: ${d.dataset.rk}</div>
            `;
            if(d.dataset.loc === "4") updateP4(0);
        }

        document.onkeydown = (e) => {
            if(document.activeElement.tagName === "INPUT") return;
            if(e.code === "Space" && ativa){ e.preventDefault(); abrirModal(); }
            if(!ativa) return;
            let loc = ativa.dataset.loc;
            if(e.key === "Enter"){
                if(loc==='1') mover('POS2','2');
                else if(loc==='2'){ ativa.classList.add('ready'); ativa.dataset.loc='2.5'; }
                else if(loc==='2.5'){ ativa.classList.remove('ready'); mover('POS3','3'); }
                else if(loc==='3'){ mover('POS4','4'); updateP4(1); }
                else if(loc==='4') updateP4(1);
                else if(loc==='5'){ ativa.remove(); ativa=null; }
            }
            if(e.key === "Escape"){
                if(loc==='5') mover('POS4','4');
                else if(loc==='4') updateP4(-1);
                else if(loc==='3'){ mover('POS2','2.5'); ativa.classList.add('ready'); }
                else if(loc==='2.5'){ ativa.classList.remove('ready'); ativa.dataset.loc='2'; }
                else if(loc==='2') mover('POS1','1');
            }
            if(e.key === "Delete"){ ativa.remove(); ativa=null; }
        };

        function mover(id, l) { 
            const box = document.getElementById(id);
            if(ativa && box) { box.appendChild(ativa); ativa.dataset.loc=l; box.scrollTop=box.scrollHeight; }
        }

        function updateP4(dir) {
            let i = parseInt(ativa.dataset.p4i) + dir, c = ativa.querySelector('.st-p4'), g = ativa.dataset.gate;
            if(i>=0 && i<p4_etapas.length){
                ativa.dataset.p4i = i;
                c.innerHTML = `<span class="tag-box-large">${g}</span><span class="tag-p4">${p4_etapas[i]}</span>`;
            } else if(i<0){ ativa.dataset.p4i="-1"; c.innerHTML=""; mover('POS3','3'); }
            else { mover('POS5','5'); }
        }

        function abrirModal() {
            const fields = ['cs','eobt','ty','lv','ss','rk','gate'];
            fields.forEach(k => {
                const el = document.getElementById('ed-'+(k==='gate'?'gt':k));
                if(el) el.value = ativa.dataset[k] || "";
            });
            document.getElementById('modalEdit').style.display='flex';
        }
        function fecharModal() { document.getElementById('modalEdit').style.display='none'; }
        function salvarEdicao() {
            const fields = ['cs','eobt','ty','lv','ss','rk','gate'];
            fields.forEach(k => {
                const el = document.getElementById('ed-'+(k==='gate'?'gt':k));
                if(el) ativa.dataset[k] = el.value.toUpperCase();
            });
            renderizarStrip(ativa); fecharModal();
        }
    </script>
</body>
</html>
